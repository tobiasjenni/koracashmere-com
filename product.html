<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — KORA Cashmere</title>
<meta name="robots" content="index, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://images.unsplash.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
</head>
<body>

<header class="nav" id="nav">
  <div class="nav-inner">
    <a href="/" class="logo">KORA</a>
    <nav class="nav-links">
      <a href="/shop">Shop</a>
      <a href="/story">Our Story</a>
      <a href="/wholesale">Wholesale</a>
      <button class="cart-btn snipcart-checkout" aria-label="Cart">
        <span class="cart-label">Bag</span>
        <span class="snipcart-items-count cart-count">0</span>
      </button>
    </nav>
    <button class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<div class="mobile-overlay">
  <a href="/shop">Shop</a>
  <a href="/story">Our Story</a>
  <a href="/wholesale">Wholesale</a>
</div>

<main>
  <section class="product-page">
    <div id="product-detail">
      <div class="product-detail">
        <div class="product-detail-image">
          <span style="font-size:72px;opacity:0.15;">&#x1F9F6;</span>
        </div>
        <div class="product-detail-info">
          <p style="color:var(--stone);font-size:14px;padding-top:40px;">Loading product…</p>
        </div>
      </div>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="footer-bottom"><span>&copy; 2026 KORA. All rights reserved.</span></div>
</footer>

<script src="/js/products.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
